name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libsqlite3-dev libb2-dev libffi-dev python3-dev lld
        pip install --user --upgrade git+https://github.com/kivy/buildozer.git@master cython virtualenv

    - name: Build Android APK
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        
        # Сбрасываем дефолтные пути GitHub к NDK, чтобы Buildozer скачал правильный NDK 26b
        unset ANDROID_NDK_HOME
        export BUILDOZER_WARN_ON_ROOT=0
        
        yes | buildozer -v android debug
