name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-data: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libssl-dev libgdbm-dev libsqlite3-dev libb2-dev libffi-dev Python3-dev bdown lld
        pip install --user --upgrade buildozer cython virtualenv

    - name: Initialize Buildozer
      run: buildozer init

    - name: Configure buildozer.spec
      run: |
        # Меняем настройки в автоматически созданном файле конфигурации
        sed -i 's/^title = .*/title = Kolan Mobile/' buildozer.spec
        sed -i 's/^package.name = .*/package.name = kolan/' buildozer.spec
        sed -i 's/^requirements = .*/requirements = python3,kivy,kivymd,pillow/' buildozer.spec
        sed -i 's/^#android.archs = .*/android.archs = armeabi-v7a, arm64-v8a/' buildozer.spec

    - name: Build Android APK
      run: buildozer -v android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Kolan-APK
        path: bin/*.apk
